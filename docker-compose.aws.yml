services:
  api:
    build: .
    container_name: fastapi_album_api
    restart: always
    # Mapeia a porta 80 da EC2 (padrĂŁo HTTP) para a 8000 do container
    ports:
      - "80:8000"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}  
      - DB_PORT=${DB_PORT} 
      - DB_NAME=${DB_NAME}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      # Indica ao SQLAlchemy para forĂ§ar o uso do SSL apontando para o arquivo que o Dockerfile baixou
      - PGSSLMODE=verify-full
      - PGSSLROOTCERT=/app/global-bundle.pem
    env_file:
      - .env